AllCops:
  TargetRubyVersion: 3.4

Layout/HeredocIndentation:
  Enabled: false

Metrics/AbcSize:
  Max: 30

Metrics/BlockLength:
  Max: 30
  Exclude:
    - 'test/**/*.rb'
    - 'tasks/**/*.rb'

Metrics/ClassLength:
  Enabled: false

Metrics/MethodLength:
  Max: 20

Metrics/ModuleLength:
  Enabled: false
